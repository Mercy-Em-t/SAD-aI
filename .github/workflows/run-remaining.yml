name: Run Remaining Work

on:
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      run_ci_checks:
        description: "Run backend/frontend checks"
        required: false
        type: boolean
        default: true
      run_backend_remaining:
        description: "Run remaining backend work (migrations + running projects)"
        required: false
        type: boolean
        default: true
      run_deploy:
        description: "Trigger deploy webhook"
        required: false
        type: boolean
        default: true
      environment:
        description: "Manual deploy environment"
        required: false
        type: choice
        options:
          - staging
          - production
        default: staging
      image_tag:
        description: "Optional image tag for deploy payload"
        required: false
        type: string

concurrency:
  group: run-remaining-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  ci-checks:
    name: Remaining CI Checks
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_ci_checks == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  backend-remaining:
    name: Remaining App Tasks and Migrations
    runs-on: ubuntu-latest
    needs: ci-checks
    if: >
      always() &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_backend_remaining == 'true') &&
      (needs.ci-checks.result == 'success' || needs.ci-checks.result == 'skipped')
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RUN_REMAINING_BATCH_SIZE: ${{ vars.RUN_REMAINING_BATCH_SIZE || '10' }}
      RUN_REMAINING_MAX_BATCHES: ${{ vars.RUN_REMAINING_MAX_BATCHES || '20' }}
      DB_MIGRATIONS_DIR: ${{ vars.DB_MIGRATIONS_DIR || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend remaining-work configuration
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL secret."
            exit 1
          fi
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY secret."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run remaining migrations/scripts/jobs
        working-directory: backend
        run: npm run run:remaining

  deploy-remaining:
    name: Remaining Deployment Steps
    runs-on: ubuntu-latest
    needs: backend-remaining
    if: >
      always() &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_deploy == 'true') &&
      (needs.backend-remaining.result == 'success' || needs.backend-remaining.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' || github.ref_name == 'develop' || github.ref_name == 'main')
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    permissions:
      contents: read
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
      HEALTHCHECK_RETRIES: ${{ vars.HEALTHCHECK_RETRIES || '10' }}
      HEALTHCHECK_RETRY_DELAY_SECONDS: ${{ vars.HEALTHCHECK_RETRY_DELAY_SECONDS || '15' }}
      STAGING_DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
      PRODUCTION_DEPLOY_WEBHOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
    steps:
      - name: Resolve deploy webhook
        id: webhook
        run: |
          if [ "${DEPLOY_ENV}" = "production" ]; then
            echo "url=${PRODUCTION_DEPLOY_WEBHOOK_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${STAGING_DEPLOY_WEBHOOK_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deployment configuration
        run: |
          if [ -z "${{ steps.webhook.outputs.url }}" ]; then
            echo "Missing deploy webhook secret for ${DEPLOY_ENV}."
            exit 1
          fi
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "Missing HEALTHCHECK_URL environment variable in ${DEPLOY_ENV} environment."
            exit 1
          fi

      - name: Trigger deploy
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"${DEPLOY_ENV}\",\"sha\":\"${GITHUB_SHA}\",\"image_tag\":\"${IMAGE_TAG}\"}" \
            "${{ steps.webhook.outputs.url }}"

      - name: Health check
        run: |
          for i in $(seq 1 "${HEALTHCHECK_RETRIES}"); do
            code=$(curl --silent --show-error --output /tmp/health.json --write-out "%{http_code}" "${HEALTHCHECK_URL}")
            if [ "$code" = "200" ]; then
              echo "Health check passed."
              cat /tmp/health.json
              exit 0
            fi
            echo "Health check attempt ${i}/${HEALTHCHECK_RETRIES} failed with status ${code}. Retrying in ${HEALTHCHECK_RETRY_DELAY_SECONDS}s..."
            sleep "${HEALTHCHECK_RETRY_DELAY_SECONDS}"
          done
          echo "Health check failed after retries."
          exit 1

